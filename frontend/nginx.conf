server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Fix for DNS resolution in Cloud Run when using variables in proxy_pass
    resolver 8.8.8.8 8.8.4.4 valid=30s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        # Use a variable to force Nginx to resolve DNS at runtime
        set $backend "${BACKEND_URL}";
        proxy_pass $backend;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $proxy_host; # Important for SNI
        proxy_cache_bypass $http_upgrade;
        
        # SNI support for HTTPS backends
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
    }
    
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
